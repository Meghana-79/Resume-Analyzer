<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AI Resume Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="d-flex" id="wrapper">
      <nav id="sidebar" class="bg-dark text-light">
        <div class="sidebar-header px-3 py-4">
          <h3>ResumeAI</h3>
          <p class="small text-secondary">Placement-ready analyzer</p>
        </div>
        <ul class="list-unstyled px-2">
          <li><a href="{{ url_for('dashboard.dashboard') }}" class="nav-link text-light">Dashboard</a></li>
          <li><a href="{{ url_for('resume.analyze') }}" class="nav-link text-light">Analyze Resumes</a></li>
          <li><a href="{{ url_for('dashboard.history') }}" class="nav-link text-light">Analysis History</a></li>
          <li><a href="{{ url_for('resume.export_csv') }}" class="nav-link text-light">Export CSV</a></li>
        </ul>
      </nav>
      <div id="page-content-wrapper" class="w-100">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
          <div class="container-fluid">
            <button class="btn btn-outline-secondary" id="sidebarToggle">Menu</button>
            <div class="d-flex align-items-center">
              <button class="btn btn-outline-dark" id="themeToggle">Dark Mode</button>
            </div>
          </div>
        </nav>
        <main class="container-fluid px-4 py-4">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebar = document.getElementById('sidebar');
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme === 'dark') {
        body.classList.add('dark-mode');
      }
      if (themeToggle) {
        themeToggle.addEventListener('click', () => {
          body.classList.toggle('dark-mode');
          localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
      }
      if (sidebarToggle) {
        sidebarToggle.addEventListener('click', () => {
          sidebar.classList.toggle('collapsed');
        });
      }
    </script>
  </body>
</html>
